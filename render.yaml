# render.yaml - Backend API service using Docker
services:
  - type: web
    name: dwl-backend-api
    runtime: docker
    repo: https://github.com/kishanpolekar/delulu-leagues
    dockerfilePath: ./Dockerfile       # Path to Dockerfile from repo root
    branch: main                       # Branch to deploy
    healthCheckPath: /api/health       # Endpoint Render will ping to check health
    envVars:
      # Allowed origins for CORS (add your frontend URL and localhost for dev)
      - key: ALLOWED_ORIGINS
        value: "https://delululeagues.onrender.com,http://localhost:3000,http://localhost:5173"
      
      # Admin password – generates a random secure password on first deploy with "generateValue: true"
      # You can also set a specific value: value: "your-secure-password"
      - key: ADMIN_PASSWORD
        sync: false # Render will ask for this value at deploy time
      
      # Optional: Lockout settings (defaults are fine, but you can override)
      - key: MAX_FAILED_ATTEMPTS
        value: "3"
      - key: LOCKOUT_DURATION_MINUTES
        value: "1"
      
      # If your backend uses any other environment variables, add them here.
      # For example, if you have a secret key for sessions:
      # - key: SECRET_KEY
      #   generateValue: true